name: CI/CD

# À chaque push sur main : tests backend + frontend (la « CI »), puis si tout
# est vert, build et push des images sur GHCR. Sur le serveur, Watchtower
# détecte le nouveau :latest et recrée les conteneurs automatiquement.

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  backend-tests:
    name: Tests backend (Pest/PHPUnit, sqlite mémoire)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_sqlite, intl, zip, bcmath, pcntl

      - name: Installer les dépendances Composer
        run: composer install --no-interaction --prefer-dist --no-progress

      # storage/ est entièrement gitignoré : on recrée le squelette comme le
      # fait docker-entrypoint.sh (l5-swagger écrit dans storage/api-docs).
      - name: Préparer les répertoires storage
        run: mkdir -p storage/api-docs storage/framework/cache/data storage/framework/sessions storage/framework/views storage/framework/testing storage/logs bootstrap/cache

      - name: Tests
        run: php artisan test
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync

  frontend-tests:
    name: Tests frontend (lint, format, vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Vérifier le formatage Prettier
        run: npm run format:check

      - name: Lint ESLint
        run: npm run lint

      - name: Tests unitaires Vitest
        run: npm test

  e2e:
    name: Tests E2E Playwright
    runs-on: ubuntu-latest
    needs: frontend-tests
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Installer les navigateurs Playwright
        run: npx playwright install --with-deps chromium

      - name: Exécuter les tests Playwright
        run: npm run e2e

      - name: Publier le rapport Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  build-backend:
    name: Image backend → GHCR
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, e2e]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Métadonnées (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/arthurponcin/noctambule-backend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build et push
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  build-frontend:
    name: Image frontend → GHCR
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, e2e]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Métadonnées (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/arthurponcin/noctambule-frontend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build et push
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # VITE_API_BASE_URL vide (défaut du Dockerfile) : front et API
          # partagent la même origine derrière Traefik.
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
