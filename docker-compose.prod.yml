# Déploiement production sur le serveur Unraid « Zespri ».
# Exposition via le Traefik existant (réseau externe proxy_net) :
#   https://noctambule.zespri.duckdns.org        → frontend (nginx statique)
#   https://noctambule.zespri.duckdns.org/api/…  → backend Laravel
# Secrets attendus dans un fichier .env à côté de ce fichier sur le serveur :
#   APP_KEY, DB_PASSWORD, MISTRAL_API_KEY, RESEND_API_KEY

x-backend-env: &backend-env
  APP_NAME: NOCTAMBULE
  APP_ENV: production
  APP_KEY: ${APP_KEY:?APP_KEY manquant}
  APP_DEBUG: "false"
  APP_URL: https://noctambule.zespri.duckdns.org
  APP_LOCALE: fr
  APP_FALLBACK_LOCALE: fr
  APP_TIMEZONE: Europe/Paris
  LOG_CHANNEL: stderr
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: noctambule
  DB_USERNAME: noctambule
  DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD manquant}
  REDIS_CLIENT: predis
  REDIS_HOST: redis
  REDIS_PORT: 6379
  CACHE_STORE: redis
  SESSION_DRIVER: redis
  QUEUE_CONNECTION: redis
  MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
  MISTRAL_MODEL: mistral-small-latest
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  RESEND_FROM: "NOCTAMBULE <onboarding@resend.dev>"
  FRONTEND_URL: https://noctambule.zespri.duckdns.org

services:
  postgres:
    image: postgres:16-alpine
    container_name: noctambule-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: noctambule
      POSTGRES_USER: noctambule
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD manquant}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noctambule -d noctambule"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: noctambule-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

  backend:
    image: ghcr.io/arthurponcin/noctambule-backend:latest
    build:
      context: ./backend
    container_name: noctambule-backend
    restart: unless-stopped
    environment: *backend-env
    volumes:
      - backend_vendor:/var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - proxy
    labels:
      traefik.enable: "true"
      traefik.docker.network: proxy_net
      traefik.http.routers.noctambule-api.rule: Host(`noctambule.zespri.duckdns.org`) && (PathPrefix(`/api`) || PathPrefix(`/up`) || PathPrefix(`/storage`))
      traefik.http.routers.noctambule-api.entrypoints: websecure
      traefik.http.routers.noctambule-api.tls: "true"
      traefik.http.routers.noctambule-api.tls.certresolver: duckdns
      traefik.http.routers.noctambule-api.tls.domains[0].main: zespri.duckdns.org
      traefik.http.routers.noctambule-api.tls.domains[0].sans: "*.zespri.duckdns.org"
      traefik.http.services.noctambule-api.loadbalancer.server.port: "8000"

  scheduler:
    image: ghcr.io/arthurponcin/noctambule-backend:latest
    container_name: noctambule-scheduler
    restart: unless-stopped
    environment:
      <<: *backend-env
      # Seul le backend migre au démarrage (évite la migration concurrente).
      RUN_MIGRATIONS: "false"
    volumes:
      - backend_vendor:/var/www/html/vendor
    # Planificateur Laravel : events:import s'exécute tous les jours à 04:00.
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  frontend:
    image: ghcr.io/arthurponcin/noctambule-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ""
    container_name: noctambule-frontend
    restart: unless-stopped
    networks:
      - proxy
    labels:
      traefik.enable: "true"
      traefik.docker.network: proxy_net
      traefik.http.routers.noctambule-front.rule: Host(`noctambule.zespri.duckdns.org`)
      traefik.http.routers.noctambule-front.entrypoints: websecure
      traefik.http.routers.noctambule-front.tls: "true"
      traefik.http.routers.noctambule-front.tls.certresolver: duckdns
      traefik.http.routers.noctambule-front.tls.domains[0].main: zespri.duckdns.org
      traefik.http.routers.noctambule-front.tls.domains[0].sans: "*.zespri.duckdns.org"
      traefik.http.services.noctambule-front.loadbalancer.server.port: "80"

  # CD minimal : Watchtower interroge GHCR toutes les 5 min et recrée les
  # conteneurs dès qu'un nouveau :latest est publié par la CI. Les migrations
  # sont rejouées au redémarrage par l'entrypoint du backend.
  watchtower:
    image: containrrr/watchtower:latest
    container_name: noctambule-watchtower
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Auth GHCR (images privées) : réutilise le docker login fait sur l'hôte.
      - /root/.docker/config.json:/config.json:ro
    environment:
      # Le client Docker embarqué (API 1.25) est refusé par les daemons récents.
      DOCKER_API_VERSION: "1.44"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "300"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      TZ: Europe/Paris
    command:
      - noctambule-backend
      - noctambule-scheduler
      - noctambule-frontend

networks:
  internal:
  proxy:
    external: true
    name: proxy_net

volumes:
  pgdata:
  backend_vendor:
