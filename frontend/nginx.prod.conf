server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA : toutes les routes inconnues retombent sur index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long sur les assets fingerprintés par Vite
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
